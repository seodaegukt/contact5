<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>원시인 연락처</title>
<style>
:root{--red:#ee1c25;--red-dark:#d80b16;--navy:#0f2139;--gray:#666b75}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;background:radial-gradient(circle at top,#fff 0,#eff3f8 55%,#d7deea 100%);color:#111827;display:flex;justify-content:center}
.page{width:100%;max-width:520px;min-height:100vh;background:#fff;box-shadow:0 10px 40px rgba(15,23,42,.08);overflow:hidden}
.hero{background:#fff;padding:18px 20px 8px;text-align:center}
.hero img{width:74%;max-width:305px;min-width:220px;display:block;margin:0 auto;object-fit:contain}
.wave{height:88px;margin-top:0;background:radial-gradient(120% 90px at 24% 0, rgba(238,28,37,.18) 0, rgba(238,28,37,.18) 58%, transparent 59%),radial-gradient(128% 92px at 80% 10px, rgba(255,45,57,.95) 0, rgba(255,45,57,.95) 54%, transparent 55%);background-repeat:no-repeat;background-size:68% 100%,86% 100%;background-position:left top,right top}
.card{margin:-4px 18px 20px;background:#fff;border-radius:28px;box-shadow:0 14px 32px rgba(15,23,42,.12);padding:34px 18px 24px;text-align:center}
.org{color:var(--navy);font-size:24px;font-weight:1000;letter-spacing:-.05em}
.line{width:108px;height:3px;border-radius:999px;background:var(--red);margin:16px auto 34px}
.name{color:var(--navy);font-size:58px;line-height:1.02;letter-spacing:-.08em;font-weight:1000}
.phone-number{margin-top:28px;color:#5b5f6b;font-size:34px;letter-spacing:-.03em;font-weight:500}
.action{width:100%;min-height:64px;margin-top:18px;border-radius:20px;display:flex;align-items:center;justify-content:center;gap:12px;text-decoration:none;font-size:20px;font-weight:1000}
.action.save{color:#fff;background:linear-gradient(135deg,#ff2d36,var(--red-dark));box-shadow:0 10px 18px rgba(238,28,37,.18)}
.action.outline{color:var(--red);border:2px solid rgba(238,28,37,.75);background:#fff}
.iphone-note{margin-top:24px;color:#6b6f78;font-size:13px;line-height:1.5;display:flex;align-items:center;justify-content:center;gap:8px}
.share-icon{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.footer-space{height:10px}
@media(max-width:420px){.name{font-size:50px}.phone-number{font-size:30px}.hero img{width:72%;min-width:205px}}
</style>
</head>
